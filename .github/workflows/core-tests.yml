name: Core Tests CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: |
        cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DASCII_CHARACTER_BUILD_PLUGIN=OFF -DASCII_CHARACTER_BUILD_TESTS=ON

    - name: Build tests
      run: |
        cmake --build build --config Release

    - name: Run CTest
      run: |
        cd build
        ctest -C Release --output-on-failure
